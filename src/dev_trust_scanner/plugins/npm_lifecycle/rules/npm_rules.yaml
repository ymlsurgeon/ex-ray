rules:
  - id: "NPM-001"
    name: "Suspicious eval/exec in lifecycle script"
    severity: "high"
    description: "Dynamic code execution (eval, exec, Function constructor) in npm scripts is often used for malware execution"
    patterns:
      - "\\beval\\s*\\("
      - "Function\\s*\\("
      - "\\bexec\\s*\\("
      - "execSync\\s*\\("
      - "execFile\\s*\\("
    recommendation: "Review the script manually. Remove dynamic code execution if not absolutely necessary. Consider using a static build process instead."

  - id: "NPM-002"
    name: "Base64 encoded content in lifecycle script"
    severity: "high"
    description: "Base64 encoding in npm scripts is commonly used to obfuscate malicious payloads"
    patterns:
      - "atob\\s*\\("
      - "Buffer\\.from\\s*\\([^)]+,\\s*['\"]base64['\"]\\)"
      - "[A-Za-z0-9+/]{40,}={0,2}"
    recommendation: "Decode and manually inspect the base64 content. Remove if suspicious or unnecessary."

  - id: "NPM-003"
    name: "Network calls in lifecycle scripts"
    severity: "medium"
    description: "Lifecycle scripts making network calls may be exfiltrating data or fetching malware"
    patterns:
      - "\\bcurl\\b"
      - "\\bwget\\b"
      - "https?://"
      - "fetch\\s*\\("
      - "axios\\."
      - "request\\s*\\("
      - "got\\s*\\("
      - "require\\s*\\(['\"]https?['\"]\\)"
      - "require\\s*\\(['\"]request['\"]\\)"
      - "require\\s*\\(['\"]axios['\"]\\)"
      - "require\\s*\\(['\"]got['\"]\\)"
      - "require\\s*\\(['\"]node-fetch['\"]\\)"
      - "https?\\.(?:get|request)\\s*\\("
      - "http?\\.(?:get|request)\\s*\\("
    recommendation: "Verify that network calls are legitimate and necessary. Check destination URLs carefully."

  - id: "NPM-004"
    name: "Environment variable access in lifecycle scripts"
    severity: "medium"
    description: "Accessing environment variables may indicate credential exfiltration attempts"
    patterns:
      - "process\\.env"
      - "\\$\\{[A-Z_][A-Z0-9_]*\\}"
      - "\\$[A-Z_][A-Z0-9_]*"
    recommendation: "Verify which environment variables are accessed and why. Be especially cautious of AWS_*, API_KEY, TOKEN, SECRET, PASSWORD variables."

  - id: "NPM-005"
    name: "Suspicious file system operations"
    severity: "low"
    description: "File operations outside expected paths may indicate malicious activity"
    patterns:
      - "\\.\\./.*"
      - "~/\\.ssh"
      - "~/\\.aws"
      - "/tmp/"
      - "/etc/"
      - "rm\\s+-rf"
    recommendation: "Check if file operations are expected for this package. Be cautious of operations in sensitive directories."

  - id: "NPM-006"
    name: "Shell command injection patterns"
    severity: "high"
    description: "Patterns that may allow shell command injection"
    patterns:
      - "child_process"
      - "spawn\\s*\\("
      - "/bin/sh"
      - "/bin/bash"
      - "\\|\\s*bash"
      - "\\|\\s*sh"
    recommendation: "Review for potential command injection vulnerabilities. Ensure user input is not passed to shell commands."

  - id: "NPM-007"
    name: "Obfuscated code in scripts"
    severity: "high"
    description: "Hex escapes, unicode escapes, or character code building indicates code obfuscation"
    patterns:
      - "\\\\x[0-9a-fA-F]{2}"
      - "\\\\u[0-9a-fA-F]{4}"
      - "String\\.fromCharCode"
      - "\\\\[0-7]{3}"
    recommendation: "Deobfuscate and inspect the code. Legitimate packages rarely use obfuscation."

  - id: "NPM-008"
    name: "TruffleHog binary download in lifecycle script"
    severity: "critical"
    description: "Script downloads TruffleHog secret scanner binary. This is a signature behavior of the Shai-Hulud npm worm campaign used for credential theft."
    patterns:
      - "trufflesecurity/trufflehog.*releases"
      - "trufflehog.*releases.*download"
      - "github\\.com.*trufflehog.*releases"
      - "trufflehog_linux"
      - "trufflehog\\.exe"
      - "trufflehog.*-o\\s+"
      - "wget.*trufflehog"
    recommendation: "This package downloads and executes TruffleHog, a secret-scanning tool. Legitimate packages do not scan your filesystem for credentials during installation. Remove this package immediately and rotate any exposed secrets."

  - id: "NPM-009"
    name: "TruffleHog execution in lifecycle script"
    severity: "critical"
    description: "Script executes TruffleHog binary to scan for secrets"
    patterns:
      - "\\.*/trufflehog\\s+filesystem"
      - "\\.*/trufflehog\\s+git"
      - "trufflehog.*--json"
      - "chmod\\s+\\+x\\s+trufflehog"
    recommendation: "This package executes TruffleHog to scan for secrets. This is credential theft malware. Remove immediately and audit your GitHub tokens, AWS keys, and other credentials."

  - id: "NPM-010"
    name: "Webhook service exfiltration"
    severity: "critical"
    description: "Script sends data to free webhook collection services (webhook.site, requestbin, etc.). This is a common technique for exfiltrating stolen credentials."
    patterns:
      - "webhook\\.site"
      - "webhook-test\\.com"
      - "requestbin\\.com"
      - "pipedream\\.com"
      - "hookbin\\.com"
      - "requestcatcher\\.com"
      - "eo\\.requestcatcher\\.com"
    recommendation: "This package sends data to a webhook collection service. This is commonly used for exfiltrating stolen credentials and environment variables. Remove this package immediately and rotate any tokens or credentials that may have been exposed."

  - id: "NPM-011"
    name: "Obfuscated webhook domain"
    severity: "critical"
    description: "Script contains base64-encoded or obfuscated webhook service domains"
    patterns:
      - "d2ViaG9vay5zaXRl"
      - "cmVxdWVzdGJpbi5jb20"
      - "cGlwZWRyZWFtLmNvbQ"
    recommendation: "This package contains obfuscated references to webhook collection services. This indicates deliberate attempt to hide exfiltration. Remove immediately."

  - id: "NPM-012"
    name: "Shai-Hulud campaign markers"
    severity: "critical"
    description: "Code contains known Shai-Hulud malware campaign marker strings. These are definitive indicators of compromise."
    keywords:
      - "Shai-Hulud"
      - "Sha1-Hulud"
      - "Shai-Hulud: The Second Coming"
      - "Goldox-T3chs"
      - "Goldox-T3chs: Only Happy Girl"
      - "_sha1_hulud_"
      - "_goldox_"
    recommendation: "This package contains code that creates GitHub repositories with known malware campaign markers. This is a definitive indicator of the Shai-Hulud supply chain worm. Remove this package immediately, audit your GitHub account for unauthorized repositories, and revoke any GitHub tokens that may have been exposed."

  - id: "NPM-013"
    name: "Repository creation with suspicious markers"
    severity: "high"
    description: "Code creates GitHub repositories combined with campaign markers or suspicious patterns"
    patterns:
      - "api\\.github\\.com/user/repos.*Shai-Hulud"
      - "api\\.github\\.com/user/repos.*Goldox"
      - "git remote add.*-migration"
      - "git init.*Shai-Hulud"
    recommendation: "This code creates GitHub repositories with patterns associated with malware campaigns. Review carefully and remove if unauthorized."
